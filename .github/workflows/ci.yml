name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check src/ tests/

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - name: core install must be torch-free
        run: python -c "import importlib.util,sys; sys.exit(0) if importlib.util.find_spec('torch') is None else sys.exit('torch leaked into core')"
      - run: pytest -q

  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e .
      - name: G1-G8 sensitivity gates (the lifeline)
        run: benchgauge gate

  honest-marketing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: README must avoid marketing claims and keep its disclaimers
        run: |
          banned='fully automatic|完全自動|永続的|forever|never fails|state-of-the-art performance|outperforms|beats GPT|detects contamination|contamination detector'  # honest:ok (banned-phrase DEFINITION for the scanner, not a claim)
          if grep -rEni "$banned" README.md docs/ 2>/dev/null; then echo "BANNED marketing phrase found"; exit 1; fi
          grep -qi 'synthetic'  README.md || { echo "missing synthetic disclaimer"; exit 1; }
          grep -qi 'curation'   README.md || { echo "missing curation caveat"; exit 1; }
          grep -qi 'diagnostic' README.md || { echo "missing diagnostic framing"; exit 1; }
          echo "honest-marketing checks passed"
      - name: report/gate must be RNG-free (deterministic outputs)
        run: |
          if grep -rn 'np\.random\|random\.' src/benchgauge/report/ src/benchgauge/gate.py; then echo "RNG found in a deterministic module"; exit 1; fi
          echo "determinism checks passed"

  action-selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: composite action on a healthy fixture must succeed
        uses: ./
        with:
          input: tests/fixtures/healthy.json
          fail-under: "2"
      - name: negative self-test -- unhealthy fixture must exit 1
        run: |
          pip install -e .
          set +e
          benchgauge report tests/fixtures/unhealthy.json --no-irt
          rc=$?
          set -e
          if [ "$rc" -ne 1 ]; then echo "expected exit 1 on unhealthy, got $rc"; exit 1; fi
          echo "negative self-test passed (exit 1 as expected)"
